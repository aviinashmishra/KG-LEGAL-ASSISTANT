<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KG-RAG Legal · Indian Legal Intelligence</title>
  <meta name="description" content="Knowledge-graph-grounded, citation-verified legal intelligence for Indian law." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- 3D knowledge-graph engine (Three.js + force-directed) -->
  <script src="https://unpkg.com/three@0.149.0/build/three.min.js"></script>
  <script src="https://unpkg.com/3d-force-graph@1.70.10/dist/3d-force-graph.min.js"></script>
  <script src="https://unpkg.com/three-spritetext@1.6.5/dist/three-spritetext.min.js"></script>
  <link rel="stylesheet" href="/assets/styles.css" />
  <script>
    tailwind.config = {
      theme: { extend: {
        fontFamily: { sans: ['Inter','sans-serif'], display: ['Fraunces','serif'] },
        colors: {
          ink: '#211c15', paper: '#f5efe3', panel: '#fffdf8', edge: '#e7dcc7',
          gold: '#9a7b3f', goldsoft: '#7e6433', accent: '#2f5d8a'
        }
      }}
    }
  </script>
</head>
<body class="font-sans antialiased">
  <!-- boot screen -->
  <div id="bootScreen">
    <div class="boot-inner">
      <div class="boot-ring"></div>
      <div class="boot-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18"/><path d="M7 6h10"/><path d="M5 21h14"/><path d="M7 6l-3 6a3 3 0 0 0 6 0Z"/><path d="M17 6l-3 6a3 3 0 0 0 6 0Z"/></svg>
      </div>
      <div class="boot-title">KG&middot;Legal</div>
      <div class="boot-sub">INDIAN&nbsp;&nbsp;LEGAL&nbsp;&nbsp;INTELLIGENCE</div>
      <div class="boot-bar"><span></span></div>
    </div>
  </div>

  <!-- subtle ambient field -->
  <canvas id="bgfx" class="fixed inset-0 -z-20"></canvas>
  <div class="fixed inset-0 -z-10 pointer-events-none">
    <div class="orb orb-gold"></div>
    <div class="orb orb-blue"></div>
    <div class="vignette"></div>
  </div>
  <div id="aurora" class="fixed inset-0 -z-10 pointer-events-none"></div>

  <!-- mobile nav scrim -->
  <div class="nav-scrim" id="navScrim"></div>

  <div class="flex min-h-screen relative">
    <!-- Sidebar -->
    <aside class="app-sidebar flex flex-col w-72 p-5 gap-4" id="sidebar">
      <div class="flex items-center gap-3">
        <div class="brand-mark w-10 h-10 rounded-xl grid place-items-center">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18"/><path d="M7 6h10"/><path d="M5 21h14"/><path d="M7 6l-3 6a3 3 0 0 0 6 0Z"/><path d="M17 6l-3 6a3 3 0 0 0 6 0Z"/></svg>
        </div>
        <div>
          <div class="font-display text-lg leading-tight text-ink">KG&middot;Legal</div>
          <div class="text-[10px] text-slate-500 tracking-[0.2em]">LEGAL INTELLIGENCE</div>
        </div>
      </div>

      <button id="newChatBtn" class="new-research-btn mt-2 w-full py-2.5 rounded-lg text-sm">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        New Research
      </button>

      <nav class="flex flex-col gap-0.5 mt-2" id="navTabs">
        <button data-tab="chat" class="tab-btn active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-9 8.34 8.5 8.5 0 0 1-3.8-.9L3 20l1.06-4.2A8.5 8.5 0 1 1 21 11.5Z"/></svg>Research Chat</button>
        <button data-tab="explorer" class="tab-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="5" cy="6" r="2.2"/><circle cx="19" cy="7" r="2.2"/><circle cx="12" cy="18" r="2.2"/><path d="M6.8 7.2 10.5 16M17.4 8.6 13 16M7 6.4h10"/></svg>Graph Explorer</button>
        <button data-tab="contradiction" class="tab-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="m18 8-4 4 4 4M6 8l4 4-4 4"/></svg>Contradiction Detector</button>
        <button data-tab="timeline" class="tab-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>Legal Timeline</button>
        <button data-tab="outcome" class="tab-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/></svg>Outcome Predictor</button>
        <button data-tab="clause" class="tab-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-3.5 8-10V5l-8-3-8 3v7c0 6.5 8 10 8 10Z"/></svg>Clause Risk Scorer</button>
        <button data-tab="jurisdiction" class="tab-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-6.2-7-11a7 7 0 0 1 14 0c0 4.8-7 11-7 11Z"/><circle cx="12" cy="10" r="2.5"/></svg>Jurisdiction Mapper</button>
        <button data-tab="drafter" class="tab-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>Contract Drafter</button>
        <button data-tab="hindi" class="tab-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg>Hindi Bridge</button>
        <button data-tab="admin" class="tab-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m7 14 3-3 3 3 5-6"/></svg>Admin Analytics</button>
      </nav>

      <div class="mt-auto text-xs text-slate-500">
        <div id="historyBox" class="space-y-1 max-h-48 overflow-auto pr-1"></div>
      </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 flex flex-col min-w-0">
      <header class="topbar flex items-center justify-between px-5 sm:px-6 py-3.5">
        <div class="flex items-center gap-3">
          <button id="mobileMenuBtn" class="mobile-menu-btn icon-btn" aria-label="Open navigation">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
          </button>
          <span class="lg:hidden font-display text-base text-ink">KG&middot;Legal</span>
          <span id="providerBadge" class="status-badge hidden sm:inline-flex items-center gap-2 text-[11px] px-3 py-1 rounded-full">loading…</span>
        </div>
        <div class="flex items-center gap-2.5">
          <span id="usageBadge" class="text-[11px] px-3 py-1 rounded-full border border-edge text-slate-500"></span>
          <button id="upgradeBtn" class="upgrade-btn text-xs px-3.5 py-1.5 rounded-lg">Upgrade</button>
          <button id="authBtn" class="auth-btn text-xs px-3.5 py-1.5 rounded-lg">Sign in</button>
        </div>
      </header>

      <section class="flex-1 overflow-auto p-5 sm:p-6" id="panelHost"></section>
    </main>
  </div>

  <!-- Auth modal -->
  <div id="authModal" class="fixed inset-0 hidden items-center justify-center bg-black/60 backdrop-blur-sm z-[60]">
    <div class="w-full max-w-sm bg-panel border border-edge rounded-2xl p-6 shadow-2xl relative">
      <div class="eyebrow mb-2">Account</div>
      <h3 class="font-display text-2xl text-ink mb-1">Welcome back</h3>
      <p class="text-xs text-slate-500 mb-4">Sign in or create an account to save research &amp; history.</p>
      <input id="authEmail" type="email" autocomplete="email" placeholder="Email" class="lux-input mb-2" />
      <input id="authPassword" type="password" autocomplete="current-password" placeholder="Password" class="lux-input mb-3" />
      <div class="flex gap-2">
        <button id="loginSubmit" class="glow-btn flex-1 py-2 text-sm">Sign in</button>
        <button id="signupSubmit" class="flex-1 py-2 rounded-lg border border-edge text-sm text-ink hover:bg-paper">Sign up</button>
      </div>
      <p class="text-[11px] text-slate-500 mt-3">Demo admin: admin@kg-legal.ai / admin</p>
      <button id="authClose" class="absolute top-4 right-5 text-slate-500 hover:text-ink" aria-label="Close">✕</button>
    </div>
  </div>

  <!-- 3D node inspector flyout -->
  <div id="nodeInspector" class="fixed top-24 right-6 w-72 hidden z-40">
    <div class="card p-4">
      <div class="flex items-start justify-between gap-2">
        <div>
          <div id="niType" class="text-[10px] uppercase tracking-widest text-gold mb-1"></div>
          <div id="niTitle" class="font-display text-base text-ink leading-tight"></div>
        </div>
        <button id="niClose" class="text-slate-500 hover:text-ink" aria-label="Close">✕</button>
      </div>
      <div id="niBody" class="mt-3 text-xs text-slate-400 space-y-1.5 max-h-72 overflow-auto"></div>
    </div>
  </div>

  <script src="/assets/app.js"></script>
</body>
</html>
