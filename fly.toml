# Fly.io deployment — `fly launch --no-deploy` then `fly deploy`.
# Set secrets with: fly secrets set ANTHROPIC_API_KEY=... JWT_SECRET=...
app = "kg-legal-assistant"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"

[[http_service.checks]]
  method = "GET"
  path = "/health"
  interval = "30s"
  timeout = "5s"
  grace_period = "20s"
