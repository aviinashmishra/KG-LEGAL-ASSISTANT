# Render Blueprint — one-click deploy of the KG-RAG Legal Assistant.
# Deploy: push to GitHub, then on render.com → New → Blueprint → pick this repo.
# Every provider key is optional; the app falls back to local implementations
# (NetworkX graph, MiniLM embeddings, in-memory cache) when a key is blank.
services:
  - type: web
    name: kg-legal-assistant
    runtime: docker
    plan: free
    region: oregon
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      # auto-generated strong secret (overrides the insecure default)
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@kg-legal.ai
      # free plan = 512 MB RAM: use the lightweight hashing embedder (no torch),
      # so startup is fast and the instance never OOMs. Set OPENAI_API_KEY (or a
      # bigger plan + LIGHT_EMBEDDINGS=false) for full-quality dense embeddings.
      - key: LIGHT_EMBEDDINGS
        value: "true"
      # set these (and the optional provider keys) in the Render dashboard
      - key: ADMIN_PASSWORD
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USERNAME
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: COHERE_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false
